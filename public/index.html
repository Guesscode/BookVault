<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破卷书库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #333; background: #f8f7f5; line-height: 1.6; }
    a { color: #333; text-decoration: none; }
    a:hover { color: #c0392b; }

    .nav { border-bottom: 1px solid #e0e0e0; padding: 12px 0; position: sticky; top: 0; background: #f8f7f5; z-index: 10; }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .nav-links { display: flex; gap: 20px; font-size: 14px; }
    .nav-links a.active { text-decoration: underline; text-underline-offset: 4px; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

    .search-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .search-input { flex: 1; padding: 10px 14px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: #333; }

    .cat-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e0e0e0; }
    .cat-btn { padding: 4px 14px; border: 1px solid #d0d0d0; border-radius: 16px; font-size: 13px; background: #fff; cursor: pointer; color: #666; transition: all 0.15s; }
    .cat-btn:hover { border-color: #999; color: #333; }
    .cat-btn.active { background: #333; color: #fff; border-color: #333; }

    .book-list { display: flex; flex-direction: column; }
    .book-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
    .book-item:hover { background: #fafafa; }
    .book-left { flex: 1; min-width: 0; }
    .book-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .book-meta { font-size: 12px; color: #999; display: flex; gap: 12px; }
    .book-badge { font-size: 11px; padding: 2px 8px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 3px; color: #666; white-space: nowrap; }
    .book-right { display: flex; align-items: center; gap: 8px; margin-left: 16px; }
    .book-size { font-size: 12px; color: #999; }

    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .stat-bar { font-size: 13px; color: #999; margin-bottom: 16px; }

    .footer { max-width: 900px; margin: 40px auto 20px; padding: 20px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #e0e0e0; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">破卷书库</a>
      <div class="nav-links">
        <a href="index.html" class="active">书库</a>
        <a href="submit.html">贡献</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索书名或关键词...">
    </div>

    <div class="cat-bar" id="catBar"></div>
    <div class="stat-bar" id="statBar"></div>

    <div class="book-list" id="bookList"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="icon">📭</div>
      <p>暂无书籍，成为第一个贡献者吧</p>
      <p style="margin-top:12px"><a href="submit.html" style="color:#c0392b">贡献一本书 →</a></p>
    </div>
    <div class="empty" id="noMatch" style="display:none">
      <p>没有找到匹配的书籍</p>
    </div>
  </div>

  <div class="footer">破卷书库 · 社区共建 · 内容由贡献者负责</div>

  <script>
    let books = [];
    let currentCat = 'all';
    const CATEGORIES = ['数学', '计算机', '物理', '商业', '人文', '历史', '其他'];

    const catBar = document.getElementById('catBar');
    const allBtn = document.createElement('button');
    allBtn.className = 'cat-btn active'; allBtn.textContent = '全部'; allBtn.dataset.cat = 'all';
    catBar.appendChild(allBtn);
    CATEGORIES.forEach(c => {
      const b = document.createElement('button');
      b.className = 'cat-btn'; b.textContent = c; b.dataset.cat = c;
      catBar.appendChild(b);
    });
    catBar.addEventListener('click', e => {
      if (!e.target.dataset.cat) return;
      currentCat = e.target.dataset.cat;
      catBar.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      render();
    });

    async function loadBooks() {
      try {
        const res = await fetch('books.json?t=' + Date.now());
        if (!res.ok) throw 0;
        books = await res.json();
      } catch { books = []; }
      document.getElementById('statBar').textContent = books.length ? '共收录 ' + books.length + ' 本书' : '';
      render();
    }

    function render() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      let list = books;
      if (currentCat !== 'all') list = list.filter(b => b.category === currentCat);
      if (q) list = list.filter(b => b.title.toLowerCase().includes(q));

      const el = document.getElementById('bookList');
      el.innerHTML = '';
      if (!books.length) { document.getElementById('emptyState').style.display = 'block'; document.getElementById('noMatch').style.display = 'none'; return; }
      document.getElementById('emptyState').style.display = 'none';
      if (!list.length) { document.getElementById('noMatch').style.display = 'block'; return; }
      document.getElementById('noMatch').style.display = 'none';

      list.forEach(book => {
        const div = document.createElement('div');
        div.className = 'book-item';
        div.onclick = () => window.open('view.html?path=' + encodeURIComponent(book.path), '_blank');
        const masked = maskContact(book.contributor);
        const date = book.date ? new Date(book.date).toLocaleDateString('zh-CN') : '';
        const size = book.fileSize ? (book.fileSize > 1048576 ? (book.fileSize/1048576).toFixed(1)+' MB' : (book.fileSize/1024).toFixed(0)+' KB') : '';
        div.innerHTML = '<div class="book-left"><div class="book-title">' + esc(book.title) + '</div><div class="book-meta"><span>' + date + '</span><span>贡献者：' + esc(masked) + '</span></div></div><div class="book-right"><span class="book-size">' + size + '</span><span class="book-badge">' + esc(book.category) + '</span></div>';
        el.appendChild(div);
      });
    }

    function maskContact(s) {
      if (!s) return '匿名';
      if (s.includes('@')) { const [a,d] = s.split('@'); return a.slice(0,2) + '***@' + d; }
      if (s.length > 4) return s.slice(0,3) + '***' + s.slice(-2);
      return s.slice(0,1) + '***';
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    document.getElementById('searchInput').addEventListener('input', render);
    loadBooks();
  </script>
</body>
</html>
