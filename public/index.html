<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookVault - 社区书库</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2.5rem 0 2rem; }
    .search-box { max-width: 560px; margin: 0 auto; }
    .search-box input { border-radius: 24px; padding: 0.7rem 1.5rem; font-size: 1.1rem; border: 2px solid transparent; }
    .search-box input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.25); }
    .book-card { background: white; border-radius: 10px; padding: 1.2rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; height: 100%; display: flex; flex-direction: column; }
    .book-card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .book-card h5 { font-size: 1.05rem; margin-bottom: 0.5rem; color: #333; }
    .book-card .badge-cat { font-size: 0.75rem; }
    .book-card .meta { font-size: 0.78rem; color: #999; margin-top: auto; padding-top: 0.5rem; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: #999; }
    .cat-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
    .cat-filter .btn { border-radius: 20px; font-size: 0.85rem; padding: 0.3rem 1rem; }
    .stat-bar { font-size: 0.85rem; color: rgba(255,255,255,0.8); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="container text-center">
      <h1>📚 社区书库</h1>
      <p class="mb-2">用户共建、自由分享的公共书籍库</p>
      <div class="search-box">
        <input type="text" class="form-control" id="searchInput" placeholder="搜索书名或关键词..." autofocus>
      </div>
      <div class="cat-filter" id="catFilter">
        <button class="btn btn-sm btn-light active" data-cat="all">全部</button>
      </div>
      <div class="stat-bar" id="statBar">加载中...</div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row g-3" id="bookGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <p style="font-size:3rem;">📭</p>
      <p>暂无书籍，成为第一个贡献者吧！</p>
    </div>
    <div class="empty-state" id="noMatch" style="display:none;">
      <p>没有找到匹配的书籍</p>
    </div>
  </div>

  <div class="text-center pb-4">
    <a href="submit.html" class="btn btn-primary" style="border-radius:24px; padding: 0.6rem 2rem; background: linear-gradient(135deg, #667eea, #764ba2); border:none;">
      ✍️ 贡献一本书
    </a>
  </div>

  <footer class="text-center text-muted py-3" style="font-size:0.8rem;">
    BookVault · 社区共建 · 内容由贡献者负责
  </footer>

  <script>
    let books = [];
    let currentCat = 'all';
    const CATEGORIES = ['数学', '计算机', '物理', '商业', '人文', '历史', '其他'];
    const CAT_COLORS = { '数学': 'primary', '计算机': 'success', '物理': 'info', '商业': 'warning', '人文': 'danger', '历史': 'secondary', '其他': 'dark' };

    // Build category filter buttons
    const catFilter = document.getElementById('catFilter');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm btn-outline-light';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      catFilter.appendChild(btn);
    });
    catFilter.addEventListener('click', (e) => {
      if (!e.target.dataset.cat) return;
      currentCat = e.target.dataset.cat;
      catFilter.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
      render();
    });

    // Load books data
    async function loadBooks() {
      try {
        const res = await fetch('books.json?t=' + Date.now());
        if (!res.ok) throw new Error('no data');
        books = await res.json();
      } catch {
        books = [];
      }
      document.getElementById('statBar').textContent = books.length ? `共收录 ${books.length} 本书` : '';
      render();
    }

    // Render book cards
    function render() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      let filtered = books;
      if (currentCat !== 'all') filtered = filtered.filter(b => b.category === currentCat);
      if (query) filtered = filtered.filter(b => b.title.toLowerCase().includes(query) || (b.preview || '').toLowerCase().includes(query));

      const grid = document.getElementById('bookGrid');
      grid.innerHTML = '';

      if (books.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('noMatch').style.display = 'none';
        return;
      }
      document.getElementById('emptyState').style.display = 'none';

      if (filtered.length === 0) {
        document.getElementById('noMatch').style.display = 'block';
        return;
      }
      document.getElementById('noMatch').style.display = 'none';

      filtered.forEach(book => {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-4 col-lg-3';
        const color = CAT_COLORS[book.category] || 'dark';
        const masked = book.contributor ? maskContact(book.contributor) : '匿名';
        const date = book.date ? new Date(book.date).toLocaleDateString('zh-CN') : '';
        col.innerHTML = `
          <div class="book-card" onclick="openBook('${escAttr(book.path)}')">
            <h5>${esc(book.title)}</h5>
            <span class="badge bg-${color} badge-cat">${esc(book.category)}</span>
            <div class="meta">贡献者：${esc(masked)}<br>${date}</div>
          </div>`;
        grid.appendChild(col);
      });
    }

    function openBook(path) {
      // Open raw GitHub content in new tab
      const rawUrl = 'https://raw.githubusercontent.com/Guesscode/BookVault/main/' + encodeURIComponent(path).replace(/%2F/g, '/');
      window.open(rawUrl, '_blank');
    }

    function maskContact(s) {
      if (s.includes('@')) { const [a, d] = s.split('@'); return a.slice(0, 2) + '***@' + d; }
      if (s.length > 4) return s.slice(0, 3) + '***' + s.slice(-2);
      return s.slice(0, 1) + '***';
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    document.getElementById('searchInput').addEventListener('input', render);
    loadBooks();
  </script>
</body>
</html>
