<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookVault - 分享你的自制书</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    body { background: #f8f9fa; }
    .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 3rem 0; }
    .warning-box { background: #dc3545; color: white; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .form-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0.75rem 2rem; font-size: 1.1rem; }
    .btn-submit:disabled { opacity: 0.6; }
    textarea { font-family: 'Consolas', 'Courier New', monospace; }
  </style>
</head>
<body>
  <div class="hero text-center">
    <div class="container">
      <h1>📚 分享你的自制书</h1>
      <p class="lead mb-0">1分钟上传，立即在公共书库中被检索到</p>
    </div>
  </div>

  <div class="container py-4" style="max-width: 720px;">
    <div class="form-card">
      <div class="warning-box">
        ⚠️ 您提交的内容将自动公开。请确保拥有版权，违法内容将被IP追踪。
      </div>

      <form id="bookForm">
        <div class="mb-3">
          <label class="form-label fw-bold">书名 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="title" maxlength="30" required placeholder="限制30字以内">
          <div class="form-text"><span id="titleCount">0</span>/30</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">分类 <span class="text-danger">*</span></label>
          <select class="form-select" id="category" required>
            <option value="">-- 请选择分类 --</option>
            <option value="数学">数学</option>
            <option value="计算机">计算机</option>
            <option value="物理">物理</option>
            <option value="商业">商业</option>
            <option value="人文">人文</option>
            <option value="历史">历史</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">书籍内容 <span class="text-danger">*</span></label>
          <textarea class="form-control" id="content" rows="16" required placeholder="支持 Markdown 语法&#10;&#10;# 第一章 引言&#10;正文内容...&#10;&#10;## 1.1 背景&#10;更多正文..."></textarea>
          <div class="form-text">支持 Markdown 语法，建议先在本地编辑器中写好再粘贴。</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">QQ号 / 邮箱 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="contact" required placeholder="用于内容来源标记">
        </div>

        <div class="cf-turnstile mb-3" data-sitekey="0x4AAAAAAD0Lg6RqfWI06uLz" data-theme="light"></div>

        <button type="submit" class="btn btn-submit w-100" id="submitBtn">提交书籍</button>
      </form>

      <div id="result" class="mt-3" style="display:none;"></div>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="text-decoration-none">← 返回书库主页</a>
    </div>
  </div>

  <script>
    const titleInput = document.getElementById('title');
    const titleCount = document.getElementById('titleCount');
    titleInput.addEventListener('input', () => { titleCount.textContent = titleInput.value.length; });

    document.getElementById('bookForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      result.style.display = 'none';

      // Get Turnstile token
      if (typeof turnstile === 'undefined') {
        result.innerHTML = '<div class="alert alert-warning">验证组件尚未加载，请刷新页面</div>';
        result.style.display = 'block';
        return;
      }
      const turnstileToken = turnstile.getResponse();
      if (!turnstileToken) {
        result.innerHTML = '<div class="alert alert-warning">请先完成人机验证</div>';
        result.style.display = 'block';
        return;
      }

      // Debounce: disable button for 60 seconds
      btn.disabled = true;
      btn.textContent = '提交中...';
      const reEnable = () => { btn.disabled = false; btn.textContent = '提交书籍'; };
      setTimeout(reEnable, 60000);

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: document.getElementById('title').value.trim(),
            category: document.getElementById('category').value,
            content: document.getElementById('content').value,
            contact: document.getElementById('contact').value.trim(),
            turnstileToken,
          }),
        });
        const data = await res.json();
        if (data.success) {
          result.innerHTML = '<div class="alert alert-success">✅ ' + data.message + '</div>';
          document.getElementById('bookForm').reset();
          turnstile.reset();
          reEnable(); // Allow immediate next submission on success
        } else {
          result.innerHTML = '<div class="alert alert-danger">❌ ' + (data.error || '提交失败') + '</div>';
          turnstile.reset();
        }
      } catch (err) {
        result.innerHTML = '<div class="alert alert-danger">❌ 网络错误，请检查网络后重试</div>';
        turnstile.reset();
        reEnable();
      }
      result.style.display = 'block';
    });
  </script>
</body>
</html>
