<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破卷书库 - 贡献书籍</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #333; background: #f8f7f5; line-height: 1.6; }
    a { color: #333; text-decoration: none; }
    a:hover { color: #c0392b; }

    .nav { border-bottom: 1px solid #e0e0e0; padding: 12px 0; }
    .nav-inner { max-width: 860px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .nav-links { display: flex; gap: 20px; font-size: 14px; }
    .nav-links a.active { text-decoration: underline; text-underline-offset: 4px; }

    .container { max-width: 860px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    .warning { background: #fff5f5; border: 1px solid #fecaca; color: #b91c1c; padding: 12px 16px; font-size: 13px; border-radius: 4px; margin-bottom: 24px; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .field label .req { color: #c0392b; }
    .field label .opt { color: #999; font-weight: 400; font-size: 12px; }
    .field input[type="text"], .field select { width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 14px; background: #fff; color: #333; outline: none; transition: border-color 0.15s; }
    .field input:focus, .field select:focus { border-color: #333; }
    .field .hint { font-size: 12px; color: #999; margin-top: 4px; }

    .upload-row { display: flex; gap: 16px; }
    .upload-half { flex: 1; min-width: 0; }
    .upload-or { display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; flex-shrink: 0; padding-top: 22px; }

    .md-editor { width: 100%; height: 202px; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; font-family: 'Consolas', 'Courier New', monospace; resize: vertical; outline: none; background: #fff; color: #333; line-height: 1.6; }
    .md-editor:focus { border-color: #333; }
    .md-count { font-size: 11px; color: #999; text-align: right; margin-top: 2px; }

    .file-drop { border: 2px dashed #d0d0d0; border-radius: 6px; padding: 48px 20px 40px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .file-drop:hover, .file-drop.dragover { border-color: #c0392b; background: #fff5f5; }
    .file-drop .icon { font-size: 28px; margin-bottom: 6px; }
    .file-drop .label { font-size: 13px; color: #666; }
    .file-drop .sublabel { font-size: 11px; color: #999; margin-top: 4px; }
    .file-info { margin-top: 10px; padding: 10px 14px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    .file-info .remove { color: #c0392b; cursor: pointer; font-size: 12px; }

    .btn-submit { width: 100%; padding: 12px; background: #c0392b; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: #a93226; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .result { margin-top: 16px; padding: 12px 16px; border-radius: 4px; font-size: 14px; display: none; }
    .result.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .result.error { background: #fff5f5; border: 1px solid #fecaca; color: #b91c1c; }

    .footer { max-width: 860px; margin: 40px auto 20px; padding: 20px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #e0e0e0; }

    @media (max-width: 640px) {
      .upload-row { flex-direction: column; }
      .upload-or { padding-top: 0; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">破卷书库</a>
      <div class="nav-links">
        <a href="index.html">书库</a>
        <a href="submit.html" class="active">贡献</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1>贡献一本书</h1>
    <div class="warning">
      <strong>版权声明</strong><br>
      您上传的内容将自动公开。上传者须对内容的合法性承担全部责任。<br>
      上传即表示您确认：①拥有该内容的版权或已获合法授权；②上传行为不侵犯任何第三方权益；③本书籍由AI生成，AI检测率不低于40%。<br>
      本平台保留配合版权方要求的义务（见<a href="dmca.html" style="color:#b91c1c;text-decoration:underline">版权政策</a>）。
    </div>

    <form id="bookForm">
      <div class="field">
        <label>书名 <span class="req">*</span></label>
        <input type="text" id="title" maxlength="30" required placeholder="限制30字以内">
        <div class="hint"><span id="titleCount">0</span>/30</div>
      </div>

      <div class="field">
        <label>分类 <span class="req">*</span></label>
        <select id="category" required>
          <option value="">-- 请选择 --</option>
          <option value="数学">数学</option>
          <option value="计算机">计算机</option>
          <option value="物理">物理</option>
          <option value="商业">商业</option>
          <option value="人文">人文</option>
          <option value="历史">历史</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <div class="field">
        <label>书籍内容 <span class="req">*</span> <span class="opt">（Markdown 或 PDF 至少选一种）</span></label>
        <div class="upload-row">
          <div class="upload-half">
            <textarea class="md-editor" id="mdContent" placeholder="Markdown 格式&#10;&#10;# 第一章&#10;正文内容...&#10;&#10;支持标准 Markdown 语法"></textarea>
            <div class="md-count"><span id="mdCount">0</span> / 500,000 字</div>
          </div>
          <div class="upload-or">或</div>
          <div class="upload-half">
            <div class="file-drop" id="fileDrop">
              <div class="icon">📄</div>
              <div class="label">点击或拖拽上传 PDF 文件</div>
              <div class="sublabel">仅支持 .pdf 格式，最大 50MB</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display:none">
            <div class="file-info" id="fileInfo" style="display:none">
              <span id="fileName"></span>
              <span class="remove" id="fileRemove">移除</span>
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label>QQ号 / 邮箱 <span class="req">*</span></label>
        <input type="text" id="contact" required placeholder="用于内容来源标记">
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAAD0Lg6RqfWIO6uLz" data-theme="light" style="margin-bottom:6px"></div>

      <div class="field" style="margin-bottom:16px">
        <label style="display:flex;align-items:flex-start;gap:8px;font-weight:400;font-size:13px;cursor:pointer">
          <input type="checkbox" id="copyrightAgree" required style="margin-top:2px;accent-color:#c0392b">
          <span>我确认拥有该内容的版权或已获合法授权，上传行为不侵犯第三方权益。如因侵权导致法律纠纷，由本人承担全部责任。</span>
        </label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">提交书籍</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <div class="footer">破卷书库 · 社区共建 · <a href="dmca.html">版权政策 / DMCA</a></div>

  <script>
    let selectedFile = null;
    let textSample = '';
    const fileDrop = document.getElementById('fileDrop');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const mdEditor = document.getElementById('mdContent');

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    document.getElementById('title').addEventListener('input', e => {
      document.getElementById('titleCount').textContent = e.target.value.length;
    });

    mdEditor.addEventListener('input', () => {
      document.getElementById('mdCount').textContent = mdEditor.value.length.toLocaleString();
    });

    fileDrop.addEventListener('click', () => fileInput.click());
    fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
    document.getElementById('fileRemove').addEventListener('click', () => {
      selectedFile = null; textSample = ''; fileInput.value = ''; fileInfo.style.display = 'none'; fileDrop.style.display = 'block';
    });

    async function handleFile(file) {
      if (!file || file.type !== 'application/pdf') return showResult('error', '仅支持 PDF 格式文件');
      if (file.size > 50 * 1024 * 1024) return showResult('error', '文件大小不能超过 50MB');
      selectedFile = file;
      fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB) — 提取文本中...';
      fileInfo.style.display = 'flex';
      fileDrop.style.display = 'none';

      textSample = '';
      try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const maxPages = Math.min(pdf.numPages, 30);
        const parts = [];
        for (let i = 1; i <= maxPages; i++) {
          const page = await pdf.getPage(i);
          const text = await page.getTextContent();
          parts.push(text.items.map(it => it.str).join(' '));
          if (parts.join(' ').length > 50000) break;
        }
        textSample = parts.join(' ').slice(0, 50000);
        const chars = textSample.length;
        fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB) — 已提取 ' + (chars > 1000 ? (chars/1000).toFixed(0)+'k' : chars) + ' 字用于AI检测';
      } catch {
        fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB) — 文本提取失败，将跳过AI检测';
      }
    }

    function showResult(type, msg) {
      const r = document.getElementById('result');
      r.className = 'result ' + type;
      r.textContent = msg;
      r.style.display = 'block';
    }

    document.getElementById('bookForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      document.getElementById('result').style.display = 'none';

      const mdContent = mdEditor.value.trim();
      if (!mdContent && !selectedFile) return showResult('error', '请填写 Markdown 内容或上传 PDF 文件（至少选一种）');
      if (typeof turnstile === 'undefined') return showResult('error', '验证组件尚未加载，请刷新页面');
      const token = turnstile.getResponse();
      if (!token) return showResult('error', '请先完成人机验证');

      btn.disabled = true;
      btn.textContent = '上传中...';
      const reEnable = () => { btn.disabled = false; btn.textContent = '提交书籍'; };
      setTimeout(reEnable, 120000);

      try {
        let pdfBase64 = '';
        if (selectedFile) {
          const buf = await selectedFile.arrayBuffer();
          const bytes = new Uint8Array(buf);
          let binary = '';
          const chunk = 8192;
          for (let i = 0; i < bytes.length; i += chunk)
            binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunk, bytes.length)));
          pdfBase64 = btoa(binary);
        }

        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: document.getElementById('title').value.trim(),
            category: document.getElementById('category').value,
            contact: document.getElementById('contact').value.trim(),
            content: mdContent,
            fileName: selectedFile ? selectedFile.name : '',
            fileSize: selectedFile ? selectedFile.size : 0,
            pdfBase64,
            textSample: mdContent || textSample,
            turnstileToken: token,
          }),
        });
        const data = await res.json();
        if (data.success) {
          showResult('success', '提交成功！书籍已上架。');
          document.getElementById('bookForm').reset();
          selectedFile = null; textSample = ''; fileInput.value = '';
          fileInfo.style.display = 'none'; fileDrop.style.display = 'block';
          document.getElementById('titleCount').textContent = '0';
          document.getElementById('mdCount').textContent = '0';
          turnstile.reset(); reEnable();
        } else {
          showResult('error', (data.error || '提交失败') + ' 请重新完成验证后重试');
          turnstile.reset(); reEnable();
        }
      } catch (err) {
        showResult('error', '网络错误，请检查网络后重试');
        turnstile.reset(); reEnable();
      }
    });
  </script>
</body>
</html>
