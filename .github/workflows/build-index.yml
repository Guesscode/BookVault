name: Build Book Index

on:
  push:
    paths:
      - 'books/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate books.json
        run: node scripts/generate-index.js

      - name: Commit and push index update
        run: |
          git config user.name "BookVault Bot"
          git config user.email "bot@bookvault.local"
          git add public/books.json
          git diff --cached --quiet || git commit -m "chore: update books index"
          git push
